<div class="overflow-y-auto px-2 pb-2 scrollbar-hide flex flex-col gap-1">
<button class="class-item text-left px-4 py-3.5 rounded-2xl active:scale-95 transition-all text-on-surface font-body-lg min-h-[44px] flex justify-between items-center">
        Kelas 10 AE 1
</button>
<button class="class-item text-left px-4 py-3.5 rounded-2xl hover:bg-black/5 active:scale-95 transition-all text-on-surface font-body-lg min-h-[44px]">Kelas 10 AE 2</button>
<button class="class-item text-left px-4 py-3.5 rounded-2xl hover:bg-black/5 active:scale-95 transition-all text-on-surface font-body-lg min-h-[44px]">Kelas 10 MIPA 1</button>
<button class="class-item text-left px-4 py-3.5 rounded-2xl hover:bg-black/5 active:scale-95 transition-all text-on-surface font-body-lg min-h-[44px]">Kelas 10 MIPA 2</button>
<button class="class-item text-left px-4 py-3.5 rounded-2xl hover:bg-black/5 active:scale-95 transition-all text-on-surface font-body-lg min-h-[44px]">Kelas 11 AE 1</button>
<button class="class-item text-left px-4 py-3.5 rounded-2xl hover:bg-black/5 active:scale-95 transition-all text-on-surface font-body-lg min-h-[44px] bg-primary-container/30 text-primary-fixed-dim font-bold">Kelas 11 AE 2<span class="material-symbols-outlined text-[20px] text-primary">check</span></button>
<button class="class-item text-left px-4 py-3.5 rounded-2xl hover:bg-black/5 active:scale-95 transition-all text-on-surface font-body-lg min-h-[44px]">Kelas 12 AE 1</button>
</div>
</div>
<style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .scrollbar-hide {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const overlay = document.getElementById('modal-overlay');
        const modalCalendar = document.getElementById('modal-calendar');
        const modalKelas = document.getElementById('modal-kelas');
        
        const btnFilterTanggal = document.getElementById('btn-filter-tanggal');
        const textFilterTanggal = document.getElementById('text-filter-tanggal');
        const btnFilterKelas = document.getElementById('btn-filter-kelas');
        const textFilterKelas = document.getElementById('text-filter-kelas');
        
        const btnOkCalendar = document.getElementById('btn-ok-calendar');
        const btnCancelCalendar = document.getElementById('btn-cancel-calendar');
        const btnCloseCalendar = document.getElementById('btn-close-calendar');
        const classItems = document.querySelectorAll('.class-item');
        const dateBtns = document.querySelectorAll('.date-btn:not(.text-on-surface-variant\\/40)');

        let selectedDate = '14 Okt 2023';

        function openModal(modal) {
            overlay.classList.remove('opacity-0', 'pointer-events-none');
            overlay.classList.add('opacity-100', 'pointer-events-auto');
            
            modal.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
            modal.classList.add('opacity-100', 'pointer-events-auto', 'scale-100');
        }

        function closeModals() {
            overlay.classList.add('opacity-0', 'pointer-events-none');
            overlay.classList.remove('opacity-100', 'pointer-events-auto');
            
            [modalCalendar, modalKelas].forEach(modal => {
                modal.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
                modal.classList.remove('opacity-100', 'pointer-events-auto', 'scale-100');
            });
        }

        btnFilterTanggal.addEventListener('click', () => openModal(modalCalendar));
        btnFilterKelas.addEventListener('click', () => openModal(modalKelas));
        overlay.addEventListener('click', closeModals);
        btnCancelCalendar.addEventListener('click', closeModals);
        btnCloseCalendar.addEventListener('click', closeModals);

        dateBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                if(!e.currentTarget.textContent.trim()) return;

                dateBtns.forEach(b => {
                    b.classList.remove('bg-[#ffd700]', 'text-black', 'font-bold', 'shadow-[0_4px_12px_rgba(255,215,0,0.4)]', 'active-date');
                    if(!b.classList.contains('text-primary')) {
                         b.classList.add('hover:bg-black/5');
                    }
                });
                const target = e.currentTarget;
                target.classList.remove('hover:bg-black/5');
                target.classList.add('bg-[#ffd700]', 'text-black', 'font-bold', 'shadow-[0_4px_12px_rgba(255,215,0,0.4)]', 'active-date');
                selectedDate = `${target.textContent} Okt 2023`;
            });
        });

        btnOkCalendar.addEventListener('click', () => {
            textFilterTanggal.textContent = selectedDate;
            closeModals();
        });

        classItems.forEach(item => {
            item.addEventListener('click', (e) => {
                classItems.forEach(c => {
                    c.classList.remove('bg-primary-container/30', 'text-primary-fixed-dim', 'font-bold');
                    const icon = c.querySelector('.material-symbols-outlined');
                    if(icon) icon.remove();
                });
                
                const target = e.currentTarget;
                target.classList.add('bg-primary-container/30', 'text-primary-fixed-dim', 'font-bold');
                
                const checkIcon = document.createElement('span');
                checkIcon.className = 'material-symbols-outlined text-[20px] text-primary';
                checkIcon.textContent = 'check';
                target.appendChild(checkIcon);

                textFilterKelas.textContent = target.textContent.replace('check', '').trim();
                setTimeout(closeModals, 150);
            });
        });

        // Attendance Buttons Logic
        const studentCards = document.querySelectorAll('.student-card');
        studentCards.forEach(card => {
            const attendanceBtns = card.querySelectorAll('.attendance-btn');
            
            attendanceBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    attendanceBtns.forEach(b => {
                        b.className = "attendance-btn flex-1 bg-white/50 dark:bg-black/5 text-on-surface border border-white/40 font-label-md text-label-md py-2.5 px-3 rounded-full whitespace-nowrap active:scale-95 transition-all duration-200 hover:bg-white/70";
                    });
                    
                    const target = e.currentTarget;
                    target.className = "attendance-btn flex-1 bg-[#ffd700] text-[#705e00] shadow-[0_4px_12px_rgba(255,215,0,0.3)] font-label-md text-label-md py-2.5 px-3 rounded-full whitespace-nowrap active:scale-95 transition-all duration-200 border border-transparent";
                });
            });
        });
    });
</script>
</body></html>
